<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WizyVision Technical Exercise</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <p class="eyebrow">Image Q&amp;A</p>
        <h1>Ask a question about an uploaded image.</h1>
        <p class="intro">
          Upload one image, ask one question, and choose between the stable Tier
          1 flow or the optional Agentic Vision mode that can show code-driven
          inspection steps.
        </p>

        <form id="ask-form" class="form" novalidate>
          <div class="field">
            <label for="image">Image</label>
            <input
              id="image"
              name="image"
              type="file"
              accept="image/jpeg,image/png,image/webp"
            />
            <p class="hint">Accepted formats: JPG, PNG, WEBP. Maximum file size: 5 MB.</p>
          </div>

          <div class="field">
            <label for="question">Question</label>
            <textarea
              id="question"
              name="question"
              rows="4"
              placeholder="Example: What is happening in this image?"
            ></textarea>
          </div>

          <label class="toggle-row" for="agentic-mode">
            <input id="agentic-mode" name="agentic-mode" type="checkbox" />
            <span>
              <strong>Use Agentic Vision mode</strong>
              <span class="toggle-hint"
                >Uses Gemini 3 Flash Preview with code execution and a visible
                Think → Act → Observe timeline.</span
              >
            </span>
          </label>

          <button id="submit-button" type="submit">Ask</button>
        </form>

        <p id="status-message" class="status" aria-live="polite"></p>
        <p id="error-message" class="message message-error" role="alert" hidden></p>

        <section id="answer-section" class="answer" hidden>
          <h2>Answer</h2>
          <p id="answer-text"></p>
          <p id="model-text" class="hint" hidden></p>
        </section>

        <section id="timeline-section" class="timeline" hidden>
          <h2>Timeline</h2>
          <div id="timeline-list" class="timeline-list"></div>
        </section>
      </section>
    </main>

    <script src="/static/script.js"></script>
  </body>
</html>
