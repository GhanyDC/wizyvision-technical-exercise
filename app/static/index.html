<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WizyVision Technical Exercise</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <p class="eyebrow">Image Q&amp;A</p>
        <h1>Ask a question about an uploaded image.</h1>
        <p class="intro">
          This starter app accepts one image and one natural-language question,
          then sends both to the backend. Gemini integration is intentionally
          stubbed for now.
        </p>

        <form id="ask-form" class="form" novalidate>
          <div class="field">
            <label for="image">Image</label>
            <input id="image" name="image" type="file" accept="image/*" />
            <p class="hint">Maximum file size: 5 MB.</p>
          </div>

          <div class="field">
            <label for="question">Question</label>
            <textarea
              id="question"
              name="question"
              rows="4"
              placeholder="Example: What is happening in this image?"
            ></textarea>
          </div>

          <button id="submit-button" type="submit">Ask</button>
        </form>

        <p id="status-message" class="status" aria-live="polite"></p>
        <p id="error-message" class="message message-error" role="alert" hidden></p>

        <section id="answer-section" class="answer" hidden>
          <h2>Answer</h2>
          <p id="answer-text"></p>
          <p id="model-text" class="hint" hidden></p>
        </section>
      </section>
    </main>

    <script src="/static/script.js"></script>
  </body>
</html>
