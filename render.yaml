services:
  - type: web
    name: wizyvision-technical-exercise
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: APP_ENVIRONMENT
        value: production
      - key: MAX_UPLOAD_SIZE_BYTES
        value: 5242880
      - key: REQUEST_TIMEOUT_SECONDS
        value: 30
      - key: GEMINI_API_KEY
        sync: false
